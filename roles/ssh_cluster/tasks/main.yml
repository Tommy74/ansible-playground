---
# Create test-machines.txt on controller
- name: Create file with all IPs on controller node
  when: inventory_hostname in groups[controller_nodes_group_name]
  template:
    src: test-machines.txt.j2
    dest: "{{ worker_nodes_list_file_path }}"
    owner: "{{ worker_nodes_list_file_owner }}"
    mode: "{{ worker_nodes_list_file_mode }}"

# configure private key on controller
- name: Ensure .ssh directory exists on controller and workers
  file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    owner: "{{ ssh_key_user }}"
    mode: "700"

- name: Generate SSH key pair on controller node
  when: inventory_hostname in groups[controller_nodes_group_name]
  community.crypto.openssh_keypair:
    path: "{{ ansible_env.HOME }}/{{ ssh_key_file }}"
    type: "{{ ssh_key_type }}"
    comment: "{{ ssh_key_comment }}"
    owner: "{{ ssh_key_user }}"
  register: ssh_keypair

- name: Read public key
  when: inventory_hostname in groups[controller_nodes_group_name]
  slurp:
    src: "{{ ansible_env.HOME }}/{{ ssh_key_file }}.pub"
  register: ssh_public_key_file

- name: Set public key fact for use by other plays
  when: inventory_hostname in groups[worker_nodes_group_name]
  set_fact:
    ssh_public_key: "{{ hostvars[groups[controller_nodes_group_name][0]].ssh_public_key_file.content | b64decode | trim }}"

- name: 1. Configure SSH to use new PK when connecting to specific hosts
  when: inventory_hostname in groups[controller_nodes_group_name]
  template:
    src: config.j2
    dest: "{{ ansible_env.HOME }}/config.tmp"
    owner: "{{ ssh_key_user }}"
    mode: "644"

- name: 2. Configure SSH to use new PK when connecting to specific hosts
  when: inventory_hostname in groups[controller_nodes_group_name]
  slurp:
    src: "{{ ansible_env.HOME }}/config.tmp"
  register: ssh_config_tmp

- name: 3. Configure SSH to use new PK when connecting to specific hosts
  when: inventory_hostname in groups[controller_nodes_group_name]
  blockinfile:
    path: "{{ ansible_env.HOME }}/.ssh/config"
    block: "{{ ssh_config_tmp.content | b64decode }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - {{ ssh_key_comment }}"
    create: true
    owner: "{{ ssh_key_user }}"
    mode: "600"

# configure private key on workers
- name: Add public key to authorized_keys on workers
  when: inventory_hostname in groups[worker_nodes_group_name]
  ansible.posix.authorized_key:
    user: "{{ ssh_key_user }}"
    key: "{{ ssh_public_key }}"
    state: present
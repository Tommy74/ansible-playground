---
- name: Get user home directory
  shell: "echo ~{{ ssh_key_user }}"
  register: user_home
  changed_when: false

- name: Ensure .ssh directory exists
  file:
    path: "{{ user_home.stdout }}/.ssh"
    state: directory
    owner: "{{ ssh_key_user }}"
    group: "{{ ssh_key_group }}"
    mode: "700"

- name: Generate SSH key pair
  community.crypto.openssh_keypair:
    path: "{{ user_home.stdout }}/{{ ssh_key_file }}"
    type: "{{ ssh_key_type }}"
    comment: "{{ ssh_key_comment }}"
    owner: "{{ ssh_key_user }}"
    group: "{{ ssh_key_group }}"
  register: ssh_keypair

- name: Read public key
  slurp:
    src: "{{ user_home.stdout }}/{{ ssh_key_file }}.pub"
  register: ssh_public_key_file

- name: Set public key fact for use by other plays
  set_fact:
    ssh_public_key: "{{ ssh_public_key_file.content | b64decode | trim }}"
